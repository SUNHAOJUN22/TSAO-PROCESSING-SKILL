name: One-shot branch consolidation

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tsao-branch-consolidation
  cancel-in-progress: false

jobs:
  consolidate:
    if: ${{ startsWith(github.event.issue.title, '[BRANCH-CONSOLIDATE]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Inventory and merge every non-main branch
        id: merge
        shell: bash
        run: |
          set -Eeuo pipefail
          report="$RUNNER_TEMP/branch-report.md"
          : > "$report"
          echo "## Branch inventory and integration" >> "$report"
          echo >> "$report"
          mapfile -t branches < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/ \
              | grep -v '^HEAD$' \
              | grep -v '^main$' \
              | sort -u
          )
          printf 'branch_count=%s\n' "${#branches[@]}" >> "$GITHUB_OUTPUT"
          printf 'branches<<EOF\n%s\nEOF\n' "$(printf '%s\n' "${branches[@]:-}")" >> "$GITHUB_OUTPUT"

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No non-main branches were found." >> "$report"
            exit 0
          fi

          for branch in "${branches[@]}"; do
            ahead=$(git rev-list --count "main..origin/$branch")
            behind=$(git rev-list --count "origin/$branch..main")
            echo "- \`$branch\`: ahead of main=$ahead; behind main=$behind" >> "$report"
            if git merge-base --is-ancestor "origin/$branch" HEAD; then
              echo "  - already fully contained in main" >> "$report"
              continue
            fi
            echo "  - merging unique history into main" >> "$report"
            if ! git merge --no-edit --no-ff -X theirs --allow-unrelated-histories "origin/$branch"; then
              git merge --abort || true
              echo "MERGE_FAILED=$branch" >> "$GITHUB_ENV"
              echo "  - **MERGE FAILED; no branches will be deleted**" >> "$report"
              exit 21
            fi
          done

          for branch in "${branches[@]}"; do
            if ! git merge-base --is-ancestor "origin/$branch" HEAD; then
              echo "ANCESTRY_FAILED=$branch" >> "$GITHUB_ENV"
              echo "- **Ancestry verification failed for \`$branch\`; no deletion performed.**" >> "$report"
              exit 22
            fi
          done
          echo "All non-main branches are now fully represented in the candidate main history." >> "$report"

      - name: Install
        run: python -m pip install --quiet -e .[dev]

      - name: Dependency integrity
        run: python -m pip check

      - name: Full repository qualification
        run: |
          python -m compileall -f -q tsao scripts skills
          python -m pytest -q -p no:cacheprovider tests skills/process-general/tests skills/poe/tests skills/polymer-general/tests
          python scripts/run_ci.py
          python -m tsao.cli doctor --root . --profile core --refresh-source-manifest
          python -m ruff check tsao tests scripts skills
          python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse

      - name: Remove this one-shot workflow
        run: |
          git rm .github/workflows/consolidate-branches.yml
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: consolidate repository into main"
          fi

      - name: Publish consolidated main
        run: git push origin HEAD:main

      - name: Delete all non-main branches only after verification
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          mapfile -t branches < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/ \
              | grep -v '^HEAD$' \
              | grep -v '^main$' \
              | sort -u
          )
          for branch in "${branches[@]}"; do
            if ! git merge-base --is-ancestor "origin/$branch" HEAD; then
              echo "Refusing to delete $branch because it is not contained in main" >&2
              exit 31
            fi
            git push origin --delete "$branch"
          done

          mapfile -t remaining < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort)
          printf '%s\n' "${remaining[@]}" | tee "$RUNNER_TEMP/remaining-branches.txt"
          if [ "${#remaining[@]}" -ne 1 ] || [ "${remaining[0]}" != "main" ]; then
            echo "Expected exactly one branch named main" >&2
            exit 32
          fi

      - name: Report success and close trigger issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            cat "$RUNNER_TEMP/branch-report.md"
            echo
            echo "## Final state"
            echo
            echo "- final main: \`$(git rev-parse HEAD)\`"
            echo "- full repository qualification: **PASS**"
            echo "- remaining branch: \`main\`"
            echo "- temporary consolidation workflow: removed"
          } > "$RUNNER_TEMP/result.md"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$RUNNER_TEMP/result.md"
          gh issue close "${{ github.event.issue.number }}" --reason completed

      - name: Report failure without deleting unverified branches
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Branch consolidation stopped safely"
            echo
            [ -f "$RUNNER_TEMP/branch-report.md" ] && cat "$RUNNER_TEMP/branch-report.md"
            echo
            echo "No unverified branch deletion is permitted. Inspect the failed job before retrying."
            echo "- merge failure: \`${MERGE_FAILED:-none}\`"
            echo "- ancestry failure: \`${ANCESTRY_FAILED:-none}\`"
          } > "$RUNNER_TEMP/failure.md"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$RUNNER_TEMP/failure.md"
