name: One-shot branch consolidation

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tsao-branch-consolidation
  cancel-in-progress: false

jobs:
  consolidate:
    if: ${{ startsWith(github.event.issue.title, '[BRANCH-CONSOLIDATE-FINAL]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure Git and inventory branches
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          report="$RUNNER_TEMP/branch-report.md"
          : > "$report"
          echo "## Final branch integration" >> "$report"
          echo >> "$report"
          mapfile -t branches < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/ \
              | grep -v '^HEAD$' \
              | grep -v '^main$' \
              | sort -u
          )
          printf '%s\n' "${branches[@]:-}" > "$RUNNER_TEMP/branches.txt"
          echo "Non-main branches found: **${#branches[@]}**" >> "$report"
          echo >> "$report"
          for branch in "${branches[@]}"; do
            ahead=$(git rev-list --count "origin/main..origin/$branch")
            behind=$(git rev-list --count "origin/$branch..origin/main")
            echo "- \`$branch\`: ahead=$ahead; behind=$behind; head=\`$(git rev-parse "origin/$branch")\`" >> "$report"
          done

      - name: Preserve every branch history without regressing the integrated tree
        shell: bash
        run: |
          set -Eeuo pipefail
          while IFS= read -r branch; do
            [ -n "$branch" ] || continue
            if git merge-base --is-ancestor "origin/$branch" HEAD; then
              continue
            fi
            git merge --no-edit --no-ff -s ours --allow-unrelated-histories "origin/$branch" \
              -m "Merge $branch into main after content integration"
          done < "$RUNNER_TEMP/branches.txt"

          while IFS= read -r branch; do
            [ -n "$branch" ] || continue
            git merge-base --is-ancestor "origin/$branch" HEAD || {
              echo "Branch history was not preserved: $branch" >&2
              exit 21
            }
          done < "$RUNNER_TEMP/branches.txt"

      - name: Install
        run: python -m pip install --quiet -e .[dev]

      - name: Full repository qualification
        run: |
          python -m pip check
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          python -m compileall -f -q tsao scripts skills
          python -m pytest -q -p no:cacheprovider tests skills/process-general/tests skills/poe/tests skills/polymer-general/tests
          python scripts/run_ci.py
          python -m tsao.cli doctor --root . --profile core
          python -m ruff check tsao tests scripts skills
          python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse

      - name: Remove temporary branch-management workflows and refresh identity
        run: |
          git rm -f \
            .github/workflows/consolidate-branches.yml \
            .github/workflows/audit-branches.yml \
            .github/workflows/diagnose-consolidation.yml
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: finish main-only branch consolidation"
          fi
          python -m tsao.cli doctor --root . --profile core

      - name: Reconcile any concurrent main updates
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            git merge --no-edit -X ours origin/main -m "Merge concurrent main updates before consolidation publish"
          fi
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          git add reports/SOURCE_CORE_MANIFEST.tsv
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh source manifest after final merge"
          fi
          python -m tsao.cli doctor --root . --profile core

      - name: Publish consolidated main
        run: git push origin HEAD:main

      - name: Delete every non-main branch
        shell: bash
        run: |
          set -Eeuo pipefail
          while IFS= read -r branch; do
            [ -n "$branch" ] || continue
            git push origin --delete "$branch"
          done < "$RUNNER_TEMP/branches.txt"

          mapfile -t remaining < <(
            git ls-remote --heads origin \
              | awk '{sub("refs/heads/", "", $2); print $2}' \
              | sort
          )
          printf '%s\n' "${remaining[@]}" > "$RUNNER_TEMP/remaining-branches.txt"
          if [ "${#remaining[@]}" -ne 1 ] || [ "${remaining[0]}" != "main" ]; then
            echo "Expected exactly one branch named main" >&2
            cat "$RUNNER_TEMP/remaining-branches.txt" >&2
            exit 31
          fi

      - name: Report success and close trigger issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            cat "$RUNNER_TEMP/branch-report.md"
            echo
            echo "## Verified final state"
            echo
            echo "- final main: \`$(git rev-parse HEAD)\`"
            echo "- integrated dependency and historical utilities: **PASS**"
            echo "- full repository qualification: **PASS**"
            echo "- remaining remote branches: \`main\`"
            echo "- temporary audit/consolidation/diagnostic workflows: removed"
          } > "$RUNNER_TEMP/result.md"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$RUNNER_TEMP/result.md"
          gh issue close "${{ github.event.issue.number }}" --reason completed

      - name: Report failure without deleting unverified branches
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Final consolidation stopped safely"
            echo
            [ -f "$RUNNER_TEMP/branch-report.md" ] && cat "$RUNNER_TEMP/branch-report.md"
            echo
            echo "The job failed before a verified main-only state was established."
          } > "$RUNNER_TEMP/failure.md"
          gh issue comment "${{ github.event.issue.number }}" --body-file "$RUNNER_TEMP/failure.md"
