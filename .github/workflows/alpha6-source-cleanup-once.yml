name: One-shot alpha6 source cleanup

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: ${{ github.event.issue.title == '[TSAO-ALPHA6-SOURCE-CLEANUP-20260723]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Remove generated and one-shot files
        shell: bash
        run: |
          set -Eeuo pipefail
          git rm -r --ignore-unmatch build dist wheelhouse
          mkdir -p reports/history
          if [ -f reports/CI_RESULTS.json ]; then
            git mv reports/CI_RESULTS.json reports/history/CI_RESULTS_BEFORE_RUNTIME_SPLIT.json
          fi
          git rm .github/workflows/alpha6-source-cleanup-once.yml
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Refresh committed source identity
        run: python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
      - name: Full qualification before publish
        run: python scripts/run_ci.py
      - name: Commit clean source identity
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git diff --cached --check
          git commit -m "fix: freeze clean alpha6 source identity"
          git push origin HEAD:main
      - name: Close trigger issue
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --reason completed
