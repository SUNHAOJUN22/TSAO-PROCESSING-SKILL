name: One-shot alpha6 source cleanup

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: ${{ github.event.issue.title == '[TSAO-ALPHA6-SOURCE-CLEANUP-20260723-R4]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Clean, qualify and publish
        shell: bash
        run: |
          set -Eeuo pipefail
          {
            echo '[1/7] install'
            python -m pip install --quiet -e .[dev]
            echo '[2/7] remove generated and one-shot files'
            git rm -r --ignore-unmatch build dist wheelhouse
            rm -rf build dist wheelhouse
            mkdir -p reports/history
            if [ -f reports/CI_RESULTS.json ]; then
              git mv reports/CI_RESULTS.json reports/history/CI_RESULTS_BEFORE_RUNTIME_SPLIT.json
            fi
            git rm .github/workflows/alpha6-source-cleanup-once.yml
            echo '[3/7] refresh source manifest'
            python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
            echo '[4/7] full qualification'
            python scripts/run_ci.py
            echo '[5/7] stage and validate'
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -u
            git diff --cached --check
            echo '[6/7] commit'
            git commit -m "fix: freeze clean alpha6 source identity"
            echo '[7/7] push'
            git push origin HEAD:main
          } 2>&1 | tee /tmp/alpha6-cleanup.log
      - name: Report failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## Alpha.6 source cleanup failed'
            echo
            echo '```text'
            tail -n 180 /tmp/alpha6-cleanup.log 2>/dev/null || echo 'cleanup log unavailable'
            echo '```'
          } > /tmp/cleanup-comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/cleanup-comment.md
      - name: Close successful trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --reason completed
