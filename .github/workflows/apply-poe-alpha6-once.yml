name: One-shot POE alpha6 qualification and publish

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: tsao-poe-alpha6-main-only
  cancel-in-progress: false

jobs:
  qualification:
    if: ${{ startsWith(github.event.issue.title, '[APPLY-POE-ALPHA6]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Clean editable-install metadata
        run: python -c "import pathlib, shutil; [shutil.rmtree(path) for path in pathlib.Path('.').glob('*.egg-info') if path.is_dir()]"
      - name: Full source qualification
        run: python scripts/run_ci.py
      - name: POE P0 closure
        run: python skills/poe/scripts/audit_p0.py --root .
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: Verify installed POE payload
        run: python scripts/verify_wheel_contents.py --wheel-dir wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "POE solution polymerization and solvent recovery"

  publish:
    if: ${{ startsWith(github.event.issue.title, '[APPLY-POE-ALPHA6]') }}
    needs: qualification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Requalify exact candidate
        run: |
          python -m pip install --quiet -e .[dev]
          python -m pip check
          python scripts/run_ci.py
          python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
          python scripts/verify_wheel_contents.py --wheel-dir wheelhouse
      - name: Freeze final main tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf build dist wheelhouse work .pytest_cache .ruff_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -maxdepth 1 -type d -name '*.egg-info' -prune -exec rm -rf {} +
          rm -f reports/runtime/*.json reports/runtime/*.tmp
          git rm .github/workflows/apply-poe-alpha6-once.yml
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          python -m tsao.cli doctor --root . --profile core
          git add -A
          git commit -m "feat(poe): deliver alpha6 executable specialist"
          git push origin HEAD:main
      - name: Verify one-branch final state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t branches < <(
            git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort
          )
          [ "${#branches[@]}" -eq 1 ] && [ "${branches[0]}" = "main" ]
          final_sha=$(git rev-parse HEAD)
          gh issue comment "${{ github.event.issue.number }}" --body "POE alpha.6 candidate passed all four platform jobs. Final main: \`$final_sha\`. Remaining branch: \`main\`. Temporary workflow removed."
          gh issue close "${{ github.event.issue.number }}" --reason completed

  report-failure:
    if: ${{ always() && startsWith(github.event.issue.title, '[APPLY-POE-ALPHA6]') && needs.qualification.result != 'success' }}
    needs: qualification
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Report fail-closed result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "POE alpha.6 was not published because cross-platform qualification did not pass. Workflow run: \`$GITHUB_RUN_ID\`. No cleanup/publish step was executed."
