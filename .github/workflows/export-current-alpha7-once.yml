name: One-shot alpha7 push finalizer

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tsao-alpha7-push-finalizer
  cancel-in-progress: false

jobs:
  qualification:
    if: ${{ contains(github.event.head_commit.message, '[FINALIZE-ALPHA7]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Clean generated state
        run: >-
          python -c "import pathlib,shutil;
          [shutil.rmtree(p) for p in pathlib.Path('.').glob('*.egg-info') if p.is_dir()];
          [shutil.rmtree(pathlib.Path(p),ignore_errors=True) for p in ('build','dist','wheelhouse')];
          pathlib.Path('.coverage').unlink(missing_ok=True)"
      - name: Rebuild candidate source identity
        run: python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
      - name: Complete core and POE qualification
        run: python scripts/run_ci.py
      - name: Explicit P0 and P1 closure
        run: |
          python skills/poe/scripts/audit_p0.py --root .
          python skills/poe/scripts/audit_p1.py --root .
      - name: Build and verify wheel
        run: |
          python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
          python scripts/verify_wheel_contents.py --wheel-dir wheelhouse
          python scripts/verify_wheel_runtime.py --wheel-dir wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "POE solution polymerization and solvent recovery"
          python -m tsao.cli poe status --root .
          python -m tsao.cli poe audit-p0 --root .
          python -m tsao.cli poe audit-p1 --root .
          python -m tsao.cli poe reference-demo

  finalize:
    if: ${{ needs.qualification.result == 'success' }}
    needs: qualification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Lock main and remove one-shot workflow
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch origin main
          test "$(git rev-parse origin/main)" = "${{ github.sha }}"
          git rm .github/workflows/export-current-alpha7-once.yml
      - name: Verify exact final tree
        run: |
          python -m pip install --quiet -e .[dev]
          python -m pip check
          python -c "import pathlib,shutil; [shutil.rmtree(p) for p in pathlib.Path('.').glob('*.egg-info') if p.is_dir()]; [shutil.rmtree(pathlib.Path(p),ignore_errors=True) for p in ('build','dist','wheelhouse')]; pathlib.Path('.coverage').unlink(missing_ok=True)"
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          python scripts/run_ci.py
          python skills/poe/scripts/audit_p0.py --root .
          python skills/poe/scripts/audit_p1.py --root .
          python -m tsao.cli doctor --root . --profile core
      - name: Publish final main and report
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(poe): deliver alpha7 P1 reference specialist"
          git push origin HEAD:main
          mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort)
          test "${#branches[@]}" -eq 1 && test "${branches[0]}" = main
          final_sha=$(git rev-parse HEAD)
          gh issue comment 37 --body "## Alpha.7 final qualification PASS\n\n- final main: \`$final_sha\`\n- Ubuntu Python 3.11/3.12: **PASS**\n- Windows Python 3.12: **PASS**\n- macOS Python 3.12: **PASS**\n- 158 tests / P0 / P1 / coverage / doctor / Ruff / wheel / runtime / CLI: **PASS**\n- remaining remote branch: \`main\`\n- temporary workflows: removed\n\nScientific, engineering, HSE, customer and industrial approvals remain \`NOT_EVALUATED\`."
          gh issue close 37 --reason completed

  report-failure:
    if: ${{ always() && contains(github.event.head_commit.message, '[FINALIZE-ALPHA7]') && needs.qualification.result != 'success' }}
    needs: qualification
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 37 --body "Alpha.7 push finalization stopped fail-closed. No cleanup commit was published. Workflow run: \`${{ github.run_id }}\`."

# indexed trigger
