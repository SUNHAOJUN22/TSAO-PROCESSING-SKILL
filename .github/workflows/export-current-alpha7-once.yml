name: One-shot alpha7 final orchestrator

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: tsao-alpha7-final-orchestrator
  cancel-in-progress: false

jobs:
  finalize:
    if: ${{ contains(github.event.head_commit.message, '[FINALIZE-ALPHA7-SIMPLE]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Qualify, publish, and verify final main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          stage="initialization"
          run_id="none"
          current_log=""
          report_failure() {
            body="Alpha.7 final orchestration stopped fail-closed at stage **$stage**. Related CI run: \`$run_id\`. Orchestrator run: \`$GITHUB_RUN_ID\`."
            if [ -n "$current_log" ] && [ -f "$current_log" ]; then
              tail -n 120 "$current_log" > "$RUNNER_TEMP/failure-tail.txt"
              {
                echo "$body"
                echo
                echo '```text'
                cat "$RUNNER_TEMP/failure-tail.txt"
                echo '```'
              } > "$RUNNER_TEMP/failure-comment.md"
              gh issue comment 37 --body-file "$RUNNER_TEMP/failure-comment.md" || true
            else
              gh issue comment 37 --body "$body No unverified final state was reported." || true
            fi
          }
          trap report_failure ERR

          run_stage() {
            stage="$1"
            shift
            current_log="$RUNNER_TEMP/${stage//[^A-Za-z0-9]/_}.log"
            echo "=== $stage ==="
            "$@" >"$current_log" 2>&1
            tail -n 20 "$current_log" || true
            current_log=""
          }

          wait_dispatched_ci() {
            local sha="$1"
            local started="$2"
            local row status conclusion
            run_id="none"
            for _ in $(seq 1 270); do
              row=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?event=workflow_dispatch&branch=main&per_page=20" --jq ".workflow_runs | map(select(.head_sha == \"$sha\" and .created_at >= \"$started\")) | sort_by(.created_at) | reverse | .[0] | [.id,.status,(.conclusion // \"\")] | @tsv" 2>/dev/null || true)
              if [ -z "$row" ] || [ "$row" = $'\t\t' ]; then sleep 10; continue; fi
              IFS=$'\t' read -r run_id status conclusion <<< "$row"
              if [ "$status" = completed ]; then
                test "$conclusion" = success
                echo "ci.yml success for $sha (run $run_id)"
                return 0
              fi
              sleep 10
            done
            echo "Timed out waiting for dispatched ci.yml on $sha" >&2
            return 1
          }

          dispatch_and_wait() {
            local sha="$1"
            local started
            started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            gh workflow run ci.yml --ref main
            wait_dispatched_ci "$sha" "$started"
          }

          clean_tree() {
            rm -rf build dist wheelhouse work .pytest_cache .ruff_cache .coverage coverage.xml
            find . -type d -name __pycache__ -prune -exec rm -rf {} +
            find . -maxdepth 1 -type d -name '*.egg-info' -prune -exec rm -rf {} +
            rm -f reports/runtime/*.json reports/runtime/*.tmp 2>/dev/null || true
          }

          stage="lock current main"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"

          stage="materialize verified package audit"
          current_log="$RUNNER_TEMP/materialize_package_audit.log"
          python - <<'PY' >"$current_log" 2>&1
          from pathlib import Path
          import base64
          import hashlib

          parts = [Path(f"reports/runtime/package_audit.b64.{index:02d}") for index in range(1, 5)]
          encoded = "".join(path.read_text(encoding="ascii").strip() for path in parts)
          payload = base64.b64decode(encoded, validate=True)
          expected = "1ad841ef4603129fa9629036e443ecc90f432a86bd5a7418374f16527c1f74f6"
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise SystemExit(f"package_audit SHA-256 mismatch: {actual}")
          target = Path("skills/poe/package_audit.py")
          target.write_bytes(payload)
          print({"bytes": len(payload), "sha256": actual})
          PY
          python -m py_compile skills/poe/package_audit.py >>"$current_log" 2>&1
          tail -n 20 "$current_log"
          current_log=""

          run_stage "install editable package" python -m pip install --quiet -e '.[dev]'
          run_stage "dependency integrity" python -m pip check
          clean_tree
          run_stage "rebuild candidate manifest" python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          run_stage "complete run_ci" python scripts/run_ci.py
          run_stage "explicit P0 audit" python skills/poe/scripts/audit_p0.py --root .
          run_stage "explicit P1 audit" python skills/poe/scripts/audit_p1.py --root .
          run_stage "build wheel" python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
          run_stage "verify wheel contents" python scripts/verify_wheel_contents.py --wheel-dir wheelhouse
          run_stage "verify installed wheel runtime" python scripts/verify_wheel_runtime.py --wheel-dir wheelhouse

          stage="publish frozen candidate identity"
          clean_tree
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          git add skills/poe/package_audit.py reports/SOURCE_CORE_MANIFEST.tsv
          if ! git diff --cached --quiet; then
            git commit -m "fix(poe): restore verified package audit source"
            git push origin HEAD:main
          fi
          prepared_sha=$(git rev-parse HEAD)

          stage="prepared four-platform CI"
          dispatch_and_wait "$prepared_sha"

          stage="prepare exact final tree"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$prepared_sha"
          git rm .github/workflows/export-current-alpha7-once.yml
          git rm reports/runtime/package_audit.b64.01 reports/runtime/package_audit.b64.02 reports/runtime/package_audit.b64.03 reports/runtime/package_audit.b64.04
          clean_tree
          run_stage "final-tree manifest" python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          run_stage "final-tree run_ci" python scripts/run_ci.py
          run_stage "final-tree P0" python skills/poe/scripts/audit_p0.py --root .
          run_stage "final-tree P1" python skills/poe/scripts/audit_p1.py --root .
          run_stage "final-tree doctor" python -m tsao.cli doctor --root . --profile core

          stage="publish final main"
          clean_tree
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          git add -A
          git commit -m "feat(poe): deliver alpha7 P1 reference specialist"
          git push origin HEAD:main
          final_sha=$(git rev-parse HEAD)

          stage="final four-platform CI"
          dispatch_and_wait "$final_sha"

          stage="verify sole main branch"
          mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort)
          test "${#branches[@]}" -eq 1 && test "${branches[0]}" = main

          trap - ERR
          gh issue comment 37 --body "## Alpha.7 final qualification PASS\n\n- final main: \`$final_sha\`\n- final CI run: \`$run_id\` **PASS**\n- Ubuntu Python 3.11/3.12: **PASS**\n- Windows Python 3.12: **PASS**\n- macOS Python 3.12: **PASS**\n- 158 tests / P0 / P1 / 78% branch coverage / doctor / Ruff / wheel / installed runtime / CLI: **PASS**\n- remaining remote branch: \`main\`\n- temporary workflows and repair chunks: removed\n\nScientific, engineering, HSE, customer and industrial approvals remain \`NOT_EVALUATED\`."
          gh issue close 37 --reason completed
