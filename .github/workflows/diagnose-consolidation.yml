name: Temporary consolidation diagnostics

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: ${{ startsWith(github.event.issue.title, '[BRANCH-DIAG]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Diagnose every stage
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          report="$RUNNER_TEMP/diag.md"
          echo '## Consolidation diagnostics' > "$report"
          echo >> "$report"

          run_check() {
            local name="$1"
            shift
            local log="$RUNNER_TEMP/${name// /_}.log"
            set +e
            "$@" >"$log" 2>&1
            local status=$?
            set -e
            echo "### $name: $([ $status -eq 0 ] && echo PASS || echo FAIL) (exit $status)" >> "$report"
            if [ $status -ne 0 ]; then
              echo >> "$report"
              echo '```text' >> "$report"
              tail -n 120 "$log" >> "$report"
              echo '```' >> "$report"
            fi
            echo >> "$report"
            return 0
          }

          mapfile -t branches < <(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/ | grep -v '^HEAD$' | grep -v '^main$' | sort -u)
          echo "Branches under test: ${branches[*]:-none}" >> "$report"
          echo >> "$report"
          merge_status=0
          for branch in "${branches[@]}"; do
            git merge --no-edit --no-ff -s ours --allow-unrelated-histories "origin/$branch" -m "Diagnostic merge $branch" >"$RUNNER_TEMP/merge.log" 2>&1 || merge_status=$?
            if [ $merge_status -ne 0 ]; then
              echo "### merge $branch: FAIL (exit $merge_status)" >> "$report"
              echo '```text' >> "$report"
              cat "$RUNNER_TEMP/merge.log" >> "$report"
              echo '```' >> "$report"
              break
            fi
            echo "### merge $branch: PASS" >> "$report"
          done
          echo >> "$report"

          run_check "install" python -m pip install --quiet -e '.[dev]'
          run_check "pip check" python -m pip check
          run_check "refresh manifest" python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          run_check "compileall" python -m compileall -f -q tsao scripts skills
          run_check "pytest" python -m pytest -q -p no:cacheprovider tests skills/process-general/tests skills/poe/tests skills/polymer-general/tests
          run_check "run ci" python scripts/run_ci.py
          run_check "doctor" python -m tsao.cli doctor --root . --profile core
          run_check "ruff" python -m ruff check tsao tests scripts skills
          run_check "wheel" python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse

          gh issue comment "${{ github.event.issue.number }}" --body-file "$report"
          gh issue close "${{ github.event.issue.number }}" --reason completed
