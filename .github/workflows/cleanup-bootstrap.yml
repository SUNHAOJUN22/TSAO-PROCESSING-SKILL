name: Cleanup temporary bootstrap files
on:
  push:
    branches: [agent/tsao-process-intelligence-os]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tsao-process-intelligence-os
          fetch-depth: 0
      - name: Remove temporary transport files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .bootstrap2
          rm -f .github/workflows/cleanup-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo 'Nothing to clean'
            exit 0
          fi
          git commit -m 'Remove temporary source transport files'
          git push origin HEAD:agent/tsao-process-intelligence-os
