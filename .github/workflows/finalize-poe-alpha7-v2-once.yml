name: Self-contained POE alpha7 final qualification v2

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tsao-poe-alpha7-final-v2
  cancel-in-progress: false

jobs:
  qualification:
    if: ${{ startsWith(github.event.issue.title, '[FINALIZE-POE-ALPHA7-V2]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Verify event candidate
        run: |
          [ "$(git rev-parse HEAD)" = "${{ github.sha }}" ] || {
            echo "main moved after event: expected ${{ github.sha }}, got $(git rev-parse HEAD)" >&2
            exit 21
          }
      - name: Apply deterministic repair and assemble large sources
        run: |
          python reports/runtime/alpha7-repair.py
          python reports/runtime/alpha7-chunks/assemble.py
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Clean editable-install metadata
        run: python -c "import pathlib, shutil; [shutil.rmtree(path) for path in pathlib.Path('.').glob('*.egg-info') if path.is_dir()]"
      - name: Full core and POE qualification
        run: python scripts/run_ci.py
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: Verify wheel payload and runtime
        run: |
          python scripts/verify_wheel_contents.py --wheel-dir wheelhouse
          python scripts/verify_wheel_runtime.py --wheel-dir wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli poe status --root .
          python -m tsao.cli poe audit-p0 --root .
          python -m tsao.cli poe audit-p1 --root .
          python -m tsao.cli poe reference-demo

  finalize:
    if: ${{ startsWith(github.event.issue.title, '[FINALIZE-POE-ALPHA7-V2]') }}
    needs: qualification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Verify tested head and finalize
        shell: bash
        run: |
          set -Eeuo pipefail
          [ "$(git rev-parse HEAD)" = "${{ github.sha }}" ] || {
            echo "main moved after qualification; refusing stale finalization" >&2
            exit 31
          }
          python reports/runtime/alpha7-repair.py
          python reports/runtime/alpha7-chunks/assemble.py
          rm -f .github/workflows/finalize-poe-alpha7-once.yml
          git rm -f .github/workflows/finalize-poe-alpha7-v2-once.yml
          rm -rf reports/runtime/alpha7-chunks
          rm -f reports/runtime/alpha7-repair.py
          rm -rf build dist wheelhouse work .pytest_cache .ruff_cache .coverage coverage.xml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -maxdepth 1 -type d -name '*.egg-info' -prune -exec rm -rf {} +
          rm -f reports/runtime/*.json reports/runtime/*.tmp
          python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
          python -m tsao.cli doctor --root . --profile core
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize POE alpha7 qualification"
          git push origin HEAD:main
      - name: Verify only main remains
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          mapfile -t branches < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/ \
              | grep -v '^HEAD$' \
              | grep -v '^main$' \
              | sort -u
          )
          for branch in "${branches[@]}"; do
            git merge-base --is-ancestor "origin/$branch" HEAD || {
              echo "Refusing to delete unmerged branch: $branch" >&2
              exit 41
            }
            git push origin --delete "$branch"
          done
          mapfile -t remaining < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort)
          [ "${#remaining[@]}" -eq 1 ] && [ "${remaining[0]}" = "main" ]
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "POE alpha.7 passed the self-contained four-platform final qualification. Final main: \`$(git rev-parse HEAD)\`. P0/P1, coverage, doctor, Ruff, wheel payload and installed-wheel runtime passed; temporary workflows and chunks were removed; only \`main\` remains. Scientific, engineering, HSE, customer and industrial approvals remain \`NOT_EVALUATED\`."
          gh issue close "${{ github.event.issue.number }}" --reason completed

  report-failure:
    if: ${{ always() && startsWith(github.event.issue.title, '[FINALIZE-POE-ALPHA7-V2]') && needs.qualification.result != 'success' }}
    needs: qualification
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Report fail-closed result
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body "POE alpha.7 v2 finalization stopped fail-closed because at least one platform failed. No finalization or branch deletion was performed."
