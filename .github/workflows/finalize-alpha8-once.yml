name: Finalize alpha8 once

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: tsao-alpha8-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    if: ${{ contains(github.event.head_commit.message, '[FINALIZE-ALPHA8]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Run fail-closed alpha8 finalizer
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/finalize_alpha8.py
