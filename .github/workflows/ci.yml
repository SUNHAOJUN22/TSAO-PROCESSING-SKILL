name: TSAO alpha4 contract-compliant diagnostic

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Capture pytest diagnostic
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q -p no:cacheprovider tests > /tmp/pytest-alpha4.txt 2>&1
          status=$?
          cat /tmp/pytest-alpha4.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report pytest diagnostic
        if: ${{ steps.pytest.outputs.status != '0' && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Automated alpha.4 pytest diagnostic v2'
            echo
            echo '```text'
            tail -n 200 /tmp/pytest-alpha4.txt
            echo '```'
          } > /tmp/pytest-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pytest-comment.md
      - name: Enforce tests
        if: ${{ steps.pytest.outputs.status != '0' }}
        run: exit 1
