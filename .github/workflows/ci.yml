name: TSAO CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Compile
        run: python -m compileall -f -q tsao scripts
      - name: Test
        run: python -m pytest -q -p no:cacheprovider tests
      - name: Ruff
        run: python -m ruff check tsao tests scripts
      - name: CLI smoke
        run: |
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"
          python scripts/run_ci.py
