name: TSAO alpha5 test diagnostic

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: First failing test
        run: >-
          python -m pytest -x -vv -p no:cacheprovider
          tests
          skills/process-general/tests
          skills/poe/tests
          skills/polymer-general/tests
      - name: Repository doctor
        if: always()
        run: python -m tsao.cli doctor --root . --profile core || true
