name: TSAO alpha6 qualification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tsao-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  qualification:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Core qualification
        run: python scripts/run_ci.py
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "continuous catalytic reactor and solvent recovery"
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"

  source-snapshot:
    needs: qualification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install --quiet -e .
      - name: Verify committed source identity
        run: python -m tsao.cli doctor --root . --profile core
      - name: Build deterministic public-source snapshot
        run: python scripts/export_source_snapshot.py --root . --out TSAO-PROCESSING-SKILL-source-alpha.6.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tsao-source-alpha6-${{ github.sha }}
          path: |
            TSAO-PROCESSING-SKILL-source-alpha.6.zip
            TSAO-PROCESSING-SKILL-source-alpha.6.zip.sha256
          if-no-files-found: error
          retention-days: 14
