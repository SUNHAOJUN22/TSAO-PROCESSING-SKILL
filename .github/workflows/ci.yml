name: TSAO alpha5 qualification

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  qualification:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Core qualification
        run: python scripts/run_ci.py
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "continuous catalytic reactor and solvent recovery"
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"

  refresh-source-manifest:
    needs: qualification
    if: ${{ needs.qualification.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install --quiet -e .
      - name: Refresh complete public-source manifest
        run: python scripts/build_source_asset_manifest.py --root . --out reports/SOURCE_CORE_MANIFEST.tsv
      - name: Commit refreshed manifest
        run: |
          if git diff --quiet -- reports/SOURCE_CORE_MANIFEST.tsv; then
            echo "manifest already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/SOURCE_CORE_MANIFEST.tsv
          git commit -m "chore: refresh complete source manifest [skip ci]"
          git push origin HEAD:main
