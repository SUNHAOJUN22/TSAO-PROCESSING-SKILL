name: TSAO alpha5 qualification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  qualification:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            scope: full
          - os: ubuntu-latest
            python-version: "3.12"
            scope: full
          - os: windows-latest
            python-version: "3.12"
            scope: portability
          - os: macos-latest
            python-version: "3.12"
            scope: portability
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Compile
        run: python -m compileall -f -q tsao scripts skills
      - name: Tests
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests
          skills/process-general/tests
          skills/poe/tests
          skills/polymer-general/tests
      - name: Capability audit
        run: python scripts/audit_capabilities.py
      - name: Repository doctor
        run: python -m tsao.cli doctor --root . --profile core
      - name: Ruff
        run: >-
          python -m ruff check
          tsao tests scripts
          skills/poe/scripts skills/poe/tests
          skills/polymer-general/scripts skills/polymer-general/tests
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: Integrated CI
        if: matrix.scope == 'full'
        run: python scripts/run_ci.py
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "continuous catalytic reactor and solvent recovery"
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"
