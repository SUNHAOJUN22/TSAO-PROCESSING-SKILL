name: TSAO alpha5 Windows bash diagnostic

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostic:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Capture first Windows failure
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -x -vv -p no:cacheprovider tests skills/process-general/tests skills/poe/tests skills/polymer-general/tests > "$RUNNER_TEMP/alpha5-windows.txt" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish Windows failure
        if: ${{ steps.pytest.outputs.status != '0' && github.event_name == 'pull_request' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Automated alpha.5 Windows diagnostic'
            echo
            echo '```text'
            tail -n 160 "$RUNNER_TEMP/alpha5-windows.txt"
            echo '```'
          } > "$RUNNER_TEMP/comment.md"
          gh api --method PATCH repos/${{ github.repository }}/issues/comments/5032252454 -F body=@"$RUNNER_TEMP/comment.md"
      - name: Enforce tests
        if: ${{ steps.pytest.outputs.status != '0' }}
        run: exit 1
