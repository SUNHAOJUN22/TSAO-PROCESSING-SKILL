name: TSAO alpha5 Ruff diagnostic

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Capture Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          python -m ruff check tsao tests scripts skills/process-general/tests skills/poe/scripts skills/poe/tests skills/polymer-general/scripts skills/polymer-general/tests --output-format=concise > /tmp/alpha5-ruff.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish Ruff in known comment
        if: ${{ steps.ruff.outputs.status != '0' && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Automated alpha.5 Ruff diagnostic'
            echo
            echo '```text'
            cat /tmp/alpha5-ruff.txt
            echo '```'
          } > /tmp/alpha5-comment.md
          gh api --method PATCH repos/${{ github.repository }}/issues/comments/5032252454 -F body=@/tmp/alpha5-comment.md
      - name: Enforce Ruff
        if: ${{ steps.ruff.outputs.status != '0' }}
        run: exit 1
