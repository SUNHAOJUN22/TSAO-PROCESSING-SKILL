name: TSAO alpha5 qualification

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  qualification:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Dependency integrity
        run: python -m pip check
      - name: Core qualification
        run: python scripts/run_ci.py
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation . -w wheelhouse
      - name: CLI smoke
        run: |
          python -m tsao.cli doctor --root . --profile core
          python -m tsao.cli route "continuous catalytic reactor and solvent recovery"
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"

  export-source-manifest:
    needs: qualification
    if: ${{ needs.qualification.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install --quiet -e .
      - name: Generate complete public-source manifest
        run: python scripts/build_source_asset_manifest.py --root . --out "${{ runner.temp }}/SOURCE_CORE_MANIFEST.tsv"
      - name: Upload source manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tsao-source-manifest
          path: ${{ runner.temp }}/SOURCE_CORE_MANIFEST.tsv
          if-no-files-found: error
          archive: false
      - name: Publish manifest to temporary audit issue
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Generated SOURCE_CORE_MANIFEST.tsv'
            echo
            echo '```tsv'
            cat "${{ runner.temp }}/SOURCE_CORE_MANIFEST.tsv"
            echo '```'
          } > "${{ runner.temp }}/manifest-comment.md"
          gh issue comment 6 --body-file "${{ runner.temp }}/manifest-comment.md"
