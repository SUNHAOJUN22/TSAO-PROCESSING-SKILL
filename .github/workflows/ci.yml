name: TSAO CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --quiet -e .[dev]
      - name: Ruff diagnostic
        id: ruff
        shell: bash
        run: |
          set +e
          python -m ruff check tsao tests scripts --output-format=concise > /tmp/ruff.txt 2>&1
          status=$?
          cat /tmp/ruff.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report Ruff diagnostic
        if: ${{ steps.ruff.outputs.status != '0' && matrix.python-version == '3.11' && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Automated Ruff diagnostic'
            echo
            echo '```text'
            cat /tmp/ruff.txt
            echo '```'
          } > /tmp/ruff-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/ruff-comment.md
      - name: Enforce Ruff
        if: ${{ steps.ruff.outputs.status != '0' }}
        run: exit 1
      - name: Compile
        run: python -m compileall -f -q tsao scripts
      - name: Test
        run: python -m pytest -q -p no:cacheprovider tests
      - name: CLI smoke
        run: |
          python -m tsao.cli route "metallocene EPDM ENB solution polymerization"
          python scripts/run_ci.py
