name: Export current main for alpha7 rebuild

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  export:
    if: ${{ startsWith(github.event.issue.title, '[EXPORT-ALPHA7-MAIN]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
      - name: Export tracked source
        run: git archive --format=zip --output=tsao-main-alpha7-base.zip HEAD
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tsao-main-alpha7-base-${{ github.sha }}
          path: tsao-main-alpha7-base.zip
          if-no-files-found: error
          retention-days: 3
      - name: Report run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "run_id=${{ github.run_id }} sha=${{ github.sha }}"
          gh issue close "${{ github.event.issue.number }}" --reason completed
